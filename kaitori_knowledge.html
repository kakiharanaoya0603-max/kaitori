<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14120f">
<title>買取ナレッジ帳</title>
<style>
:root{
  --ink:#14120f; --ink2:#1e1b16; --ink3:#292520; --line:#3a352c;
  --gold:#c9a227; --gold-soft:#e0c268; --paper:#ece7da; --paper-dim:#a89f8d;
  --red:#d96b5c; --green:#7fb069; --blue:#6fa3c7; --purple:#a98fc7; --orange:#e0954f; --gray:#8f8a7e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--ink);color:var(--paper);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.65;min-height:100vh;padding-bottom:90px}
.serif{font-family:"Hiragino Mincho ProN","Yu Mincho","MS PMincho",serif}
/* header */
header{position:sticky;top:0;z-index:50;background:linear-gradient(to bottom,var(--ink) 75%,rgba(20,18,15,.92));backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 14px 8px}
.h-top{display:flex;align-items:center;gap:10px}
.h-title{font-size:1.05rem;letter-spacing:.14em;color:var(--gold-soft);font-weight:600;white-space:nowrap}
.h-title small{color:var(--paper-dim);letter-spacing:.05em;font-size:.62rem;display:block;font-weight:400}
.h-spacer{flex:1}
.icon-btn{background:none;border:1px solid var(--line);color:var(--paper-dim);border-radius:8px;padding:6px 10px;font-size:.78rem;cursor:pointer}
.icon-btn:active{background:var(--ink3)}
/* search */
.searchbar{margin-top:8px;display:flex;gap:8px}
.searchbar input{flex:1;background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:9px 12px;color:var(--paper);font-size:16px;outline:none}
.searchbar input:focus{border-color:var(--gold)}
.searchbar input::placeholder{color:#6d6759}
/* breadcrumb */
.crumbs{display:flex;align-items:center;gap:6px;padding:10px 14px 0;font-size:.78rem;color:var(--paper-dim);flex-wrap:wrap}
.crumbs a{color:var(--gold-soft);text-decoration:none;cursor:pointer}
.crumbs .sep{color:#5a5548}
main{padding:12px 14px 20px;max-width:760px;margin:0 auto}
/* category cards */
.cat-grid{display:grid;gap:12px;margin-top:6px}
.cat-card{position:relative;border:1px solid var(--line);border-radius:14px;padding:18px 16px;background:var(--ink2);cursor:pointer;overflow:hidden}
.cat-card:active{background:var(--ink3)}
.cat-card .cname{font-size:1.25rem;letter-spacing:.3em;color:var(--paper)}
.cat-card .cen{font-size:.66rem;letter-spacing:.25em;color:var(--gold);margin-bottom:2px}
.cat-card .ccount{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--paper-dim);font-size:.75rem;text-align:right}
.cat-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:.85}
/* list items (brand / model) */
.list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.li{border:1px solid var(--line);border-radius:12px;background:var(--ink2);padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.li:active{background:var(--ink3)}
.li .nm{font-size:1rem;font-weight:600}
.li .sub{font-size:.7rem;color:var(--paper-dim);letter-spacing:.08em}
.li .grow{flex:1;min-width:0}
.li .cnt{font-size:.72rem;color:var(--paper-dim);white-space:nowrap}
.li .arrow{color:#5a5548}
.badge-row{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
/* entry cards */
.entry{border:1px solid var(--line);border-radius:12px;background:var(--ink2);padding:12px 14px;margin-top:10px;position:relative}
.entry .e-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.entry .e-text{font-size:.9rem;white-space:pre-wrap;word-break:break-word}
.entry .e-edit{position:absolute;top:8px;right:10px;font-size:.7rem;color:var(--paper-dim);border:1px solid var(--line);border-radius:6px;padding:2px 8px;cursor:pointer;background:none}
.tag{display:inline-block;font-size:.66rem;padding:2px 8px;border-radius:999px;border:1px solid;letter-spacing:.05em}
.tag.month{color:var(--paper-dim);border-color:var(--line)}
.t-鉄板{color:var(--green);border-color:var(--green)}
.t-高騰{color:var(--gold-soft);border-color:var(--gold)}
.t-警戒{color:var(--red);border-color:var(--red)}
.t-相場{color:var(--blue);border-color:var(--blue)}
.t-小ネタ{color:var(--purple);border-color:var(--purple)}
.t-知識{color:var(--gray);border-color:var(--gray)}
.thumbs{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.thumbs img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:pointer}
/* section title */
.sec{margin-top:18px;display:flex;align-items:baseline;gap:8px}
.sec .st{font-size:.75rem;letter-spacing:.25em;color:var(--gold)}
.sec .line{flex:1;height:1px;background:var(--line)}
/* filter chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding:8px 0 2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;font-size:.72rem;padding:4px 12px;border-radius:999px;border:1px solid var(--line);color:var(--paper-dim);background:var(--ink2);cursor:pointer}
.chip.on{border-color:var(--gold);color:var(--gold-soft)}
/* fab */
.fab{position:fixed;right:18px;bottom:22px;z-index:60;background:var(--gold);color:var(--ink);border:none;border-radius:999px;padding:13px 20px;font-size:.9rem;font-weight:700;box-shadow:0 4px 18px rgba(0,0,0,.5);cursor:pointer;letter-spacing:.05em}
.fab:active{transform:scale(.97)}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:100;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay{align-items:center}}
.modal{background:var(--ink2);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:18px 16px 26px}
@media(min-width:600px){.modal{border-radius:16px}}
.modal h3{font-size:.95rem;color:var(--gold-soft);letter-spacing:.1em;margin-bottom:12px}
.f-label{font-size:.72rem;color:var(--paper-dim);margin:12px 0 4px;letter-spacing:.08em}
.f-input,.f-textarea,.f-select{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--paper);font-size:16px;outline:none;font-family:inherit}
.f-input:focus,.f-textarea:focus{border-color:var(--gold)}
.f-textarea{min-height:110px;resize:vertical;line-height:1.6}
.type-row{display:flex;gap:6px;flex-wrap:wrap}
.type-opt{font-size:.74rem;padding:5px 12px;border-radius:999px;border:1px solid var(--line);color:var(--paper-dim);cursor:pointer}
.type-opt.on.t-鉄板{color:var(--green);border-color:var(--green)}
.type-opt.on.t-高騰{color:var(--gold-soft);border-color:var(--gold)}
.type-opt.on.t-警戒{color:var(--red);border-color:var(--red)}
.type-opt.on.t-相場{color:var(--blue);border-color:var(--blue)}
.type-opt.on.t-小ネタ{color:var(--purple);border-color:var(--purple)}
.type-opt.on.t-知識{color:var(--gray);border-color:var(--gray)}
.btn-row{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:.9rem;font-weight:700;cursor:pointer;letter-spacing:.05em}
.btn.primary{background:var(--gold);color:var(--ink)}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--paper-dim)}
.btn.danger{background:none;border:1px solid var(--red);color:var(--red);flex:0 0 auto;padding:12px 16px}
/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox img{max-width:96vw;max-height:92vh;object-fit:contain;border-radius:6px}
/* search result */
.sr-path{font-size:.68rem;color:var(--gold);letter-spacing:.05em;margin-bottom:2px}
.hl{color:var(--gold-soft);font-weight:700}
.empty{color:var(--paper-dim);font-size:.85rem;text-align:center;padding:40px 10px;line-height:2}
.note{font-size:.7rem;color:#6d6759;margin-top:6px}
.img-add{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.img-add .th{position:relative}
.img-add .th img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.img-add .th .rm{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:999px;width:20px;height:20px;font-size:.7rem;cursor:pointer;line-height:1}
.add-img-btn{width:64px;height:64px;border:1px dashed var(--line);border-radius:8px;background:none;color:var(--paper-dim);font-size:1.3rem;cursor:pointer}
.menu-list{display:flex;flex-direction:column;gap:8px}
.menu-list .btn{text-align:left}
.mlink{color:var(--gold-soft);text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;cursor:pointer}
.pin-btn{background:none;border:1px solid var(--line);color:var(--paper-dim);border-radius:6px;padding:2px 10px;font-size:.72rem;cursor:pointer}
.pin-btn.on{color:var(--gold-soft);border-color:var(--gold)}
.pin-section{margin-bottom:4px}
.pin-item{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--ink2);border-radius:10px;padding:9px 12px;margin-top:8px;cursor:pointer}
.pin-item .pnm{font-size:.88rem;flex:1;min-width:0}
.pin-item .ppath{font-size:.64rem;color:var(--paper-dim)}
.pin-item .unpin{background:none;border:none;color:var(--paper-dim);font-size:.9rem;cursor:pointer;padding:2px 4px}
.month-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.month-chip{border:1px solid var(--line);background:var(--ink2);color:var(--paper);border-radius:10px;padding:10px 16px;font-size:.85rem;cursor:pointer;letter-spacing:.05em}
.month-chip:active{background:var(--ink3)}
.t-説明{color:var(--blue);border-color:var(--blue)}
.t-後押し{color:var(--green);border-color:var(--green)}
.t-次回提案{color:var(--purple);border-color:var(--purple)}
.t-知識{color:var(--gray);border-color:var(--gray)}
.talk-card{border:1px solid var(--line);border-radius:12px;background:var(--ink2);padding:12px 14px;margin-top:10px;position:relative}
.talk-card .e-edit{position:absolute;top:8px;right:10px;font-size:.7rem;color:var(--paper-dim);border:1px solid var(--line);border-radius:6px;padding:2px 8px;cursor:pointer;background:none}
.talk-card .t-head{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.talk-card .t-text{font-size:.92rem;line-height:1.7;white-space:pre-wrap}
.tag.cat{color:var(--paper-dim);border-color:var(--line)}
</style>
</head>
<body>
<header>
  <div class="h-top">
    <div class="h-title serif">買取ナレッジ帳<small>KAITORI KNOWLEDGE</small></div>
    <div class="h-spacer"></div>
    <button class="icon-btn" onclick='go({v:"talks"})'>トーク</button>
    <button class="icon-btn" onclick='go({v:"archive"})'>月別</button>
    <button class="icon-btn" onclick="openSettings()">設定</button>
  </div>
  <div class="searchbar">
    <input id="searchInput" type="search" placeholder="ブランド・モデル・キーワード検索（かな/カナ/英語OK）" oninput="onSearch(this.value)">
  </div>
</header>
<div class="crumbs" id="crumbs"></div>
<main id="main"></main>
<button class="fab" id="fab" onclick="onFab()">＋ 追加</button>
<div id="modalRoot"></div>
<div id="lightboxRoot"></div>

function uid(){return "x"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* ---- モデル名インデックス（本文リンク・全体検索用） ---- */
let modelIndex=[];
function buildIndex(){
  modelIndex=[];
  db.categories.forEach(c=>c.brands.forEach(b=>b.models.forEach(m=>{
    if(m.name && m.name.length>=2) modelIndex.push({name:m.name,cid:c.id,bid:b.id,mid:m.id});
  })));
  modelIndex.sort((a,b)=>b.name.length-a.name.length);
}
function findModelAnywhere(mid){
  for(const c of db.categories) for(const b of c.brands) for(const m of b.models) if(m.id===mid) return {c,b,m};
  return null;
}
/* 本文中に登場するモデル名を検出してクリック可能なリンクに変換（自モデルは除外） */
function linkify(text,excludeMid){
  const raw=text||"";
  let matches=[];
  modelIndex.forEach(it=>{
    if(it.mid===excludeMid) return;
    let idx=0;
    while((idx=raw.indexOf(it.name,idx))!==-1){
      matches.push({start:idx,end:idx+it.name.length,it});
      idx+=it.name.length;
    }
  });
  matches.sort((a,b)=>a.start-b.start||(b.end-b.start)-(a.end-a.start));
  let selected=[],lastEnd=-1;
  matches.forEach(mt=>{ if(mt.start>=lastEnd){selected.push(mt);lastEnd=mt.end;} });
  let out="",pos=0;
  selected.forEach(mt=>{
    out+=esc(raw.slice(pos,mt.start));
    out+=`<span class="mlink" onclick='event.stopPropagation();go({v:"model",cat:"${mt.it.cid}",brand:"${mt.it.bid}",model:"${mt.it.mid}"})'>${esc(raw.slice(mt.start,mt.end))}</span>`;
    pos=mt.end;
  });
  out+=esc(raw.slice(pos));
  return out;
}

/* ---- IndexedDB（画像） ---- */
let idb=null;
const idbReady=new Promise(res=>{
  const req=indexedDB.open("kaitoriKBimg",1);
  req.onupgradeneeded=e=>{e.target.result.createObjectStore("imgs",{keyPath:"id"});};
  req.onsuccess=e=>{idb=e.target.result;res();};
  req.onerror=()=>res();
});
function imgPut(id,dataUrl){return idbReady.then(()=>new Promise(r=>{if(!idb)return r();const tx=idb.transaction("imgs","readwrite");tx.objectStore("imgs").put({id,data:dataUrl});tx.oncomplete=r;}));}
function imgGet(id){return idbReady.then(()=>new Promise(r=>{if(!idb)return r(null);const rq=idb.transaction("imgs").objectStore("imgs").get(id);rq.onsuccess=()=>r(rq.result?rq.result.data:null);rq.onerror=()=>r(null);}));}
function imgDel(id){return idbReady.then(()=>new Promise(r=>{if(!idb)return r();const tx=idb.transaction("imgs","readwrite");tx.objectStore("imgs").delete(id);tx.oncomplete=r;}));}
function imgAll(){return idbReady.then(()=>new Promise(r=>{if(!idb)return r([]);const rq=idb.transaction("imgs").objectStore("imgs").getAll();rq.onsuccess=()=>r(rq.result||[]);rq.onerror=()=>r([]);}));}

/* ---- 検索正規化：カタカナ→ひらがな、全角英数→半角、小文字化 ---- */
function norm(s){
  return (s||"").toLowerCase()
    .replace(/[\u30a1-\u30f6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60))
    .replace(/[\uff01-\uff5e]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0))
    .replace(/[\s\u3000・\-＿_／/]/g,"");
}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function go(v){view=v;searchQ="";document.getElementById("searchInput").value="";render();window.scrollTo(0,0);}
function findCat(id){return db.categories.find(c=>c.id===id);}
function findBrand(cid,bid){const c=findCat(cid);return c?c.brands.find(b=>b.id===bid):null;}
function findModel(cid,bid,mid){const b=findBrand(cid,bid);return b?b.models.find(m=>m.id===mid):null;}

function renderRecent(){
  const all=[];
  db.categories.forEach(c=>c.brands.forEach(b=>b.models.forEach(m=>m.entries.forEach(e=>all.push({e,c,b,m})))));
  all.sort((a,x)=>(x.e.month||"").localeCompare(a.e.month||""));
  return all.slice(0,5).map(({e,c,b,m})=>`
    <div class="entry" onclick='go({v:"model",cat:"${c.id}",brand:"${b.id}",model:"${m.id}"})' style="cursor:pointer">
      <div class="sr-path">${esc(c.name)} › ${esc(b.name)} › ${esc(m.name)}</div>
      <div class="e-head"><span class="tag month">${esc(e.month||"")}</span><span class="tag t-${e.type}">${e.type}</span></div>
      <div class="e-text">${esc(e.text.length>70?e.text.slice(0,70)+"…":e.text)}</div>
    </div>`).join("");
}
function entryHTML(e,cid,bid,mid){
  return `<div class="entry">
    <button class="e-edit" onclick='openEntryModal("${cid}","${bid}","${mid}","${e.id}")'>編集</button>
    <div class="e-head"><span class="tag month">${esc(e.month||"")}</span><span class="tag t-${e.type}">${e.type}</span></div>
    <div class="e-text">${linkify(e.text,mid)}</div>
    ${e.images&&e.images.length?`<div class="thumbs">${e.images.map(id=>`<img data-img="${id}" alt="" onclick='showLightbox("${id}")'>`).join("")}</div>`:""}
  </div>`;
}
function talkHTML(t){
  return `<div class="talk-card">
    <button class="e-edit" onclick='openTalkModal("${t.id}")'>編集</button>
    <div class="t-head"><span class="tag t-${t.scene}">${t.scene}</span><span class="tag cat">${esc(t.cat||"全般")}</span></div>
    <div class="t-text">${linkify(t.text,null)}</div>

}
function renderPinned(){
  return db.pinned.map(mid=>{
    const found=findModelAnywhere(mid);
    if(!found) return "";
    const {c,b,m}=found;
    return `<div class="pin-item" onclick='go({v:"model",cat:"${c.id}",brand:"${b.id}",model:"${m.id}"})'>
      <div style="flex:1;min-width:0"><div class="pnm">${esc(m.name)}</div><div class="ppath">${esc(c.name)} › ${esc(b.name)}</div></div>

function togglePin(mid){
  const i=db.pinned.indexOf(mid);
  if(i>=0) db.pinned.splice(i,1); else db.pinned.push(mid);
  save();render();
}
function renderArchiveMonth(main,month){
  const hits=[];
  db.categories.forEach(c=>c.brands.forEach(b=>b.models.forEach(m=>m.entries.forEach(e=>{
    if(e.month===month) hits.push({e,c,b,m});
  }))));
  main.innerHTML=`<div class="chips"><div class="chip" onclick='go({v:"archive"})'>‹ 月度を選び直す</div></div>
    <div class="sec"><span class="st">${esc(month)}（${hits.length}件）</span><div class="line"></div></div>
    ${hits.map(({e,c,b,m})=>`
    <div class="entry" onclick='go({v:"model",cat:"${c.id}",brand:"${b.id}",model:"${m.id}"})' style="cursor:pointer">
      <div class="sr-path">${esc(c.name)} › ${esc(b.name)} › ${esc(m.name)}</div>
      <div class="e-head"><span class="tag t-${e.type}">${e.type}</span></div>
      <div class="e-text">${linkify(e.text,m.id)}</div>
      ${e.images&&e.images.length?`<div class="thumbs">${e.images.map(id=>`<img data-img="${id}" alt="" onclick='event.stopPropagation();showLightbox("${id}")'>`).join("")}</div>`:""}
    </div>`).join("")||`<div class="empty">この月度の記事はありません。</div>`}`;
  loadThumbs();
}
function loadThumbs(){
  document.querySelectorAll("img[data-img]").forEach(el=>{
    imgGet(el.dataset.img).then(d=>{if(d)el.src=d;else el.style.display="none";});
  });
}

/* ---- 検索 ---- */
function onSearch(q){searchQ=q.trim();render();}
function renderSearch(main){
  const q=norm(searchQ);
  if(!q){render();return;}
  const hits=[];
  db.categories.forEach(c=>c.brands.forEach(b=>{
    const bKey=norm(b.name+(b.en||"")+(b.kana||""));
    b.models.forEach(m=>{
      const mKey=norm(m.name+(m.alias||""));
      const nameHit=bKey.includes(q)||mKey.includes(q);
      m.entries.forEach(e=>{
        if(nameHit||norm(e.text).includes(q)) hits.push({e,c,b,m});
      });
      if((nameHit)&&m.entries.length===0) hits.push({e:null,c,b,m});
    });
  }));
  const talkHits=db.talks.filter(t=>norm(t.text).includes(q)||norm(t.scene).includes(q)||norm(t.cat).includes(q));
  hits.sort((a,x)=>((x.e&&x.e.month)||"").localeCompare((a.e&&a.e.month)||""));
  main.innerHTML=`<div class="sec"><span class="st">検索結果 ${hits.length+talkHits.length}件</span><div class="line"></div></div>`+
    (talkHits.length?`<div class="sec"><span class="st">トーク集（${talkHits.length}件）</span><div class="line"></div></div>${talkHits.map(t=>talkHTML(t)).join("")}`:``)+
    (hits.length||talkHits.length?"":`<div class="empty">見つかりませんでした。<br>別のキーワードで試してください。</div>`)+
    (hits.length?hits.map(({e,c,b,m})=>`
    <div class="entry" style="cursor:pointer" onclick='go({v:"model",cat:"${c.id}",brand:"${b.id}",model:"${m.id}"})'>
      <div class="sr-path">${esc(c.name)} › ${esc(b.name)} › <span class="hl">${esc(m.name)}</span></div>
      ${e?`<div class="e-head"><span class="tag month">${esc(e.month||"")}</span><span class="tag t-${e.type}">${e.type}</span></div>
      <div class="e-text">${linkify(e.text,m.id)}</div>
      ${e.images&&e.images.length?`<div class="thumbs">${e.images.map(id=>`<img data-img="${id}" alt="" onclick='event.stopPropagation();showLightbox("${id}")'>`).join("")}</div>`:""}`:`<div class="e-text" style="color:var(--paper-dim)">（記事なし）</div>`}
    </div>`).join(""):``);
  loadThumbs();
}

/* ---- FAB ---- */
function onFab(){
  if(view.v==="home"){pickCatThen(cid=>openBrandModal(cid,null));return;}
  if(view.v==="brands"){openBrandModal(view.cat,null);return;}
  if(view.v==="models"){openModelModal(view.cat,view.brand,null);return;}

  if(view.v==="talks"){openTalkModal(null);return;}
}
function pickCatThen(cb){

  </div><div class="btn-row"><button class="btn ghost" onclick="closeModal()">キャンセル</button></div>`);

/* ---- モーダル共通 ---- */
function showModal(html){

/* ---- ブランド追加/編集 ---- */
function openBrandModal(cid,bid){

    <div class="f-label">英語表記</div><input class="f-input" id="fBen" value="${b?esc(b.en||""):""}" placeholder="例：ROLEX">
    <div class="f-label">よみがな・別名（検索用／スペース区切り）</div><input class="f-input" id="fBkana" value="${b?esc(b.kana||""):""}" placeholder="例：ろれっくす rolex">
    <div class="btn-row">
      ${b?`<button class="btn danger" onclick='delBrand("${cid}","${bid}")'>削除</button>`:""}

function saveBrand(cid,bid){

  const en=document.getElementById("fBen").value.trim();

function delBrand(cid,bid){

  if(!confirm(`「${b.name}」を配下のモデル・記事ごと削除します。よろしいですか？`))return;
  const c=findCat(cid);
  b.models.forEach(m=>m.entries.forEach(e=>(e.images||[]).forEach(imgDel)));
  c.brands=c.brands.filter(x=>x.id!==bid);

/* ---- モデル追加/編集 ---- */

/* ---- 記事追加/編集 ---- */
let pendingImgs=[];
function openEntryModal(cid,bid,mid,eid){
  const m=findModel(cid,bid,mid);
  const e=eid?m.entries.find(x=>x.id===eid):null;
  pendingImgs=e?[...(e.images||[])]:[];
  const now=new Date();
  const defMonth=e?e.month:`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  showModal(`<h3>${e?"記事を編集":"記事を追加"}</h3>
    <div class="f-label">月度</div><input class="f-input" id="fEmonth" type="month" value="${esc(defMonth)}">
    <div class="f-label">種別</div>
    <div class="type-row" id="fEtype">${TYPES.map(t=>`<div class="type-opt t-${t} ${((e&&e.type)||"相場")===t?"on":""}" data-t="${t}">${t}</div>`).join("")}</div>
    <div class="f-label">内容</div><textarea class="f-textarea" id="fEtext" placeholder="相場・接客に活かせる情報をメモ">${e?esc(e.text):""}</textarea>
    <div class="f-label">画像</div>
    <div class="img-add" id="fEimgs"></div>
    <input type="file" id="fEfile" accept="image/*" multiple style="display:none" onchange="addImgs(this.files)">
    <div class="btn-row">
      ${e?`<button class="btn danger" onclick='delEntry("${cid}","${bid}","${mid}","${eid}")'>削除</button>`:""}
      <button class="btn ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" onclick='saveEntry("${cid}","${bid}","${mid}",${e?`"${eid}"`:"null"})'>保存</button>
    </div>`);
  document.querySelectorAll("#fEtype .type-opt").forEach(el=>el.onclick=()=>{
    document.querySelectorAll("#fEtype .type-opt").forEach(x=>x.classList.remove("on"));
    el.classList.add("on");
  });
  renderImgAdd();
}
function renderImgAdd(){
  const box=document.getElementById("fEimgs");
  if(!box)return;
  box.innerHTML=pendingImgs.map(id=>`<div class="th"><img data-pimg="${id}"><button class="rm" onclick='rmPendingImg("${id}")'>×</button></div>`).join("")+
    `<button class="add-img-btn" onclick="document.getElementById('fEfile').click()">＋</button>`;
  box.querySelectorAll("img[data-pimg]").forEach(el=>imgGet(el.dataset.pimg).then(d=>{if(d)el.src=d;}));
}
function rmPendingImg(id){pendingImgs=pendingImgs.filter(x=>x!==id);renderImgAdd();}
function addImgs(files){
  [...files].forEach(f=>{
    const rd=new FileReader();
    rd.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=1200;let w=img.width,h=img.height;
        if(w>max||h>max){const r=Math.min(max/w,max/h);w=Math.round(w*r);h=Math.round(h*r);}
        const cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        const dataUrl=cv.toDataURL("image/jpeg",0.82);
        const id=uid();
        imgPut(id,dataUrl).then(()=>{pendingImgs.push(id);renderImgAdd();});
      };
      img.src=rd.result;
    };
    rd.readAsDataURL(f);
  });
  document.getElementById("fEfile").value="";
}
function saveEntry(cid,bid,mid,eid){
  const month=document.getElementById("fEmonth").value;
  const typeEl=document.querySelector("#fEtype .type-opt.on");
  const type=typeEl?typeEl.dataset.t:"相場";
  const text=document.getElementById("fEtext").value.trim();
  if(!text){alert("内容を入力してください");return;}
  const m=findModel(cid,bid,mid);
  if(eid){const e=m.entries.find(x=>x.id===eid);
    (e.images||[]).forEach(id=>{if(!pendingImgs.includes(id))imgDel(id);});
    e.month=month;e.type=type;e.text=text;e.images=[...pendingImgs];}
  else{m.entries.push({id:uid(),month,type,text,images:[...pendingImgs]});}
  save();closeModal();render();
}
function delEntry(cid,bid,mid,eid){
  if(!confirm("この記事を削除します。よろしいですか？"))return;
  const m=findModel(cid,bid,mid);
  const e=m.entries.find(x=>x.id===eid);
  (e.images||[]).forEach(imgDel);
  m.entries=m.entries.filter(x=>x.id!==eid);
  save();closeModal();render();
}

    <div class="f-label">シーン</div>
    <div class="type-row" id="fTscene">${TALK_SCENES.map(s=>`<div class="type-opt t-${s} ${((t&&t.scene)||"次回提案")===s?"on":""}" data-s="${s}">${s}</div>`).join("")}</div>
    <div class="f-label">カテゴリ</div>
    <div class="type-row" id="fTcat">${TALK_CATS.map(c=>`<div class="type-opt ${((t&&t.cat)||"全般")===c?"on":""}" data-c="${c}" style="border-color:var(--line);color:${((t&&t.cat)||"全般")===c?"var(--gold-soft)":"var(--paper-dim)"}">${c}</div>`).join("")}</div>
    <div class="f-label">トーク内容</div><textarea class="f-textarea" id="fTtext" placeholder="お客様にそのまま言える文章で入力">${t?esc(t.text):""}</textarea>
    <div class="btn-row">
      ${t?`<button class="btn danger" onclick='delTalk("${tid}")'>削除</button>`:""}
      <button class="btn ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" onclick='saveTalk(${t?`"${tid}"`:"null"})'>保存</button>
    </div>`);

    el.classList.add("on");
  });
  document.querySelectorAll("#fTcat .type-opt").forEach(el=>el.onclick=()=>{

function saveTalk(tid){
  const sceneEl=document.querySelector("#fTscene .type-opt.on");
  const catEl=document.querySelector("#fTcat .type-opt.on");
  const scene=sceneEl?sceneEl.dataset.s:"次回提案";

  else{db.talks.push({id:uid(),scene,cat,text});}
  save();closeModal();render();

function delTalk(tid){
  if(!confirm("このトークを削除します。よろしいですか？"))return;
  db.talks=db.talks.filter(x=>x.id!==tid);
  save();closeModal();render();
}

/* ---- 設定（バックアップ/復元/初期化） ---- */
function openSettings(){
  showModal(`<h3>設定</h3><div class="menu-list">
    <button class="btn ghost" onclick="exportJSON()">データを書き出す（JSONバックアップ）</button>
    <button class="btn ghost" onclick="document.getElementById('mergeFile').click()">データを追記する（差分マージ読み込み）</button>
    <button class="btn ghost" onclick="document.getElementById('impFile').click()">データを読み込む（JSON復元・全置換）</button>
    <button class="btn ghost" onclick="resetSeed()" style="border-color:var(--red);color:var(--red)">初期データに戻す（自分の編集は消えます）</button>
  </div>
  <input type="file" id="impFile" accept=".json,application/json" style="display:none" onchange="importJSON(this.files[0])">
  <input type="file" id="mergeFile" accept=".json,application/json" style="display:none" onchange="mergeImport(this.files[0])">
  <p class="note">「追記する」は既存データを消さず、新しいカテゴリ・ブランド・モデル・記事だけを足し込みます。同じ記事の重複は自動でスキップされます。<br>「JSON復元」は現在のデータを丸ごと置き換えます。<br>書き出したJSONには画像も含まれます。</p>
  <div class="btn-row"><button class="btn ghost" onclick="closeModal()">閉じる</button></div>`);
}
function exportJSON(){
  imgAll().then(imgs=>{
    const payload={app:"kaitoriKB",exported:new Date().toISOString(),data:db,images:imgs};
    const blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`買取ナレッジ帳_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(a.href);
  });
}
function importJSON(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const p=JSON.parse(rd.result);
      if(!p.data||!p.data.categories)throw 0;
      if(!confirm("現在のデータを読み込んだ内容で置き換えます。よろしいですか？"))return;
      db=p.data;
      if(!db.pinned) db.pinned=[];
      if(!db.talks) db.talks=[];
      save();
      Promise.all((p.images||[]).map(im=>imgPut(im.id,im.data))).then(()=>{closeModal();go({v:"home"});});
    }catch(e){alert("ファイルの形式が正しくありません。");}
  };
  rd.readAsText(file);
}
function resetSeed(){
  if(!confirm("初期データ（2026年2〜6月のレポート抽出版）に戻します。自分で追加・編集した内容は消えます。よろしいですか？"))return;
  db=JSON.parse(JSON.stringify(SEED));save();closeModal();go({v:"home"});
}
/* ---- 差分（追記のみ）マージ読み込み ---- */
function mergeImport(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const p=JSON.parse(rd.result);
      if(!p.data||!p.data.categories)throw 0;
      let addedCat=0,addedBrand=0,addedModel=0,addedEntry=0,addedTalk=0;
      p.data.categories.forEach(ic=>{
        let c=db.categories.find(x=>x.id===ic.id)||db.categories.find(x=>x.name===ic.name);
        if(!c){db.categories.push(ic);addedCat++;ic.brands.forEach(ib=>{addedBrand++;ib.models.forEach(im=>{addedModel++;addedEntry+=im.entries.length;});});return;}
        (ic.brands||[]).forEach(ib=>{
          let b=c.brands.find(x=>x.id===ib.id)||c.brands.find(x=>x.name===ib.name);
          if(!b){c.brands.push(ib);addedBrand++;ib.models.forEach(im=>{addedModel++;addedEntry+=im.entries.length;});return;}
          (ib.models||[]).forEach(im=>{
            let m=b.models.find(x=>x.id===im.id)||b.models.find(x=>x.name===im.name);
            if(!m){b.models.push(im);addedModel++;addedEntry+=im.entries.length;return;}
            (im.entries||[]).forEach(ie=>{
              const exists=m.entries.find(x=>x.id===ie.id)||m.entries.find(x=>x.month===ie.month&&x.type===ie.type&&x.text===ie.text);
              if(!exists){m.entries.push(ie);addedEntry++;}
            });
          });
        });
      });
      if(!db.talks) db.talks=[];
      (p.data.talks||[]).forEach(it=>{
        const exists=db.talks.find(x=>x.id===it.id)||db.talks.find(x=>x.scene===it.scene&&x.cat===it.cat&&x.text===it.text);
        if(!exists){db.talks.push(it);addedTalk++;}
      });
      Promise.all((p.images||[]).map(im=>imgPut(im.id,im.data))).then(()=>{
        save();closeModal();go({v:"home"});
        alert(`追記が完了しました。\n新規カテゴリ:${addedCat} / 新規ブランド:${addedBrand} / 新規モデル:${addedModel} / 新規記事:${addedEntry} / 新規トーク:${addedTalk}`);
      });
    }catch(e){alert("ファイルの形式が正しくありません。");}
  };
  rd.readAsText(file);
}

buildIndex();
render();
